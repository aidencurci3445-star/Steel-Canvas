<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" fill="#FFFFFF" rx="112" />
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#000000" stroke-width="8" rx="96" opacity="0.1" />

  <!-- Tuerca Central (Hardware / CLI / Steel) -->
  <g transform="translate(256, 256) scale(1.5)">
     <!-- Silueta de Hexágono masivo con bordes suavizados -->
