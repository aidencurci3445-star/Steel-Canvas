     <!-- El agujero de la tuerca -->
     <circle cx="0" cy="0" r="52" fill="#FFFFFF" />
     
     <!-- Consola Terminal CLI -->
     <path d="M -18 -12 L -6 0 L -18 12" fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
     <rect x="2" y="6" width="16" height="8" fill="#000000" />
  </g>
</svg>